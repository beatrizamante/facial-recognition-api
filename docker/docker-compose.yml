version: "3.8"

services:
  app:
    container_name: "reconhecimento-facial-api"
    build:
      context: .
      dockerfile: Dockerfile
    image: facial-recognition-api
    command: python /app/main.py
    ports:
      - "443:443"
    env_file: .env
    volumes:
      - .:/app
      - ./cert
      - ./key
    networks:
      rede_local:
        ipv4_address: 0.0.0.0
    restart: on-failure

networks:
  rede_local:
    name: "rede_local"
    external: true
